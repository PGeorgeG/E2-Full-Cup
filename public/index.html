function h(tag, props, ...children) {
  if (typeof tag === 'function') return tag({ ...props, children: children.flat() });
  const el = document.createElement(tag);
  if (props) {
    for (const [k, v] of Object.entries(props)) {
      if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
      else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'className') el.className = v;
      else if (k !== 'key') el.setAttribute(k, v);
    }
  }
  for (const child of children.flat(Infinity)) {
    if (child == null || child === false) continue;
    el.appendChild(typeof child === 'string' || typeof child === 'number' ? document.createTextNode(child) : child);
  }
  return el;
}

let currentEffect = null;
function signal(init) {
  let val = init;
  const subs = new Set();
  return {
    get() { if (currentEffect) subs.add(currentEffect); return val; },
    set(v) { val = typeof v === 'function' ? v(val) : v; subs.forEach(s => s()); },
  };
}
function effect(fn) {
  const run = () => { currentEffect = run; fn(); currentEffect = null; };
  run();
}
function computed(fn) {
  const s = signal(undefined);
  effect(() => s.set(fn()));
  return { get: s.get.bind(s) };
}
function mount(container, renderFn) {
  let node = null;
  effect(() => {
    const next = renderFn();
    if (node) container.replaceChild(next, node);
    else container.appendChild(next);
    node = next;
  });
}

function checkForReward() {
  var today = todayStr();
  var state = loadBikeState();
  if (state.awardedDates && state.awardedDates.indexOf(today) >= 0) return; // already processed today
  var g = goals.get();
  var tm = meals.get().filter(function(m){ return m.date === today; });
  var totalCals = tm.reduce(function(s,m){ return s + (m.calories||0); }, 0);
  if (totalCals < g.calories * 0.9) return; // below 90% threshold

  var nextIdx = state.unlockedIds.length;
  if (nextIdx >= BIKE_PARTS.length) return; // all parts earned!

  // Mark today as checked regardless of payout (prevents re-rolling)
  if (!state.awardedDates) state.awardedDates = [];

  // --- Variable ratio mechanics ---
  // Consecutive day streak (silent — never shown to user)
  var streak = state.streak || 0;
  var yesterday = (function() {
    var d = new Date(); d.setDate(d.getDate() - 1);
    var y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dy = String(d.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+dy;
  })();
  streak = (state.awardedDates.indexOf(yesterday) >= 0) ? streak + 1 : 0;
  state.streak = streak;

  // Base payout probability: 75%, boosted quietly by streak
  var payoutChance = 0.75 + Math.min(streak, 4) * 0.04; // up to ~91% after 4 days
  // ~weekly jackpot: ~1 in 7 qualifying days pays double regardless
  var jackpot = Math.random() < (1/7);
  // Double unlock chance on non-jackpot days: 1 in 6
  var double = !jackpot && Math.random() < (1/6);

  var pays = jackpot || Math.random() < payoutChance;

  state.awardedDates.push(today);

  if (!pays) {
    // Silent non-payout — just save streak progress, no message
    saveBikeState(state);
    return;
  }

  // Award first part
  var unlocks = [];
  var part1 = BIKE_PARTS[nextIdx];
  state.unlockedIds.push(part1.id);
  unlocks.push(part1);

  // Award second part if double/jackpot and parts remain
  if ((double || jackpot) && state.unlockedIds.length < BIKE_PARTS.length) {
    var part2 = BIKE_PARTS[state.unlockedIds.length];
    state.unlockedIds.push(part2.id);
    unlocks.push(part2);
  }

  state.pendingUnlock = { parts: unlocks, isDouble: unlocks.length > 1, isJackpot: jackpot };
  saveBikeState(state);
  claimPendingUnlock();
}

function calcTDEE(p) {
  // Mifflin-St Jeor BMR
  var bmr = p.sex === 'male'
    ? 10 * p.weightKg + 6.25 * p.heightCm - 5 * p.age + 5
    : 10 * p.weightKg + 6.25 * p.heightCm - 5 * p.age - 161;
  var multipliers = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725, very_active: 1.9 };
  return Math.round(bmr * (multipliers[p.activity] || 1.55));
}

function profileSummary(p) {
  var activityLabels = { sedentary:'sedentary', light:'lightly active', moderate:'moderately active', active:'very active', very_active:'extra active' };
  return p.sex + ', ' + p.age + ' years old, ' + p.weightKg + ' kg, ' + p.heightCm + ' cm, ' + (activityLabels[p.activity] || p.activity) + ' (TDEE ~' + calcTDEE(p) + ' kcal/day)';
}

async function callClaude(system, userMsg, maxTokens=300, model=MODEL_SMART) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey.get(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model: model, max_tokens: maxTokens, system, messages: [{ role:'user', content: userMsg }] }),
  });
  const data = await res.json();
  if (!res.ok || data.error) {
    const msg = (data.error && data.error.message) || ('API error ' + res.status);
    throw new Error(msg);
  }
  return data.content.map(b => b.text || '').join('');
}

}

async function scanPhoto(file) {
  photoScanning.set(true); errMsg.set('');
  try {
    // Resize image to max 1024px and compress to JPEG before sending
    const base64 = await new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var maxDim = 1024;
          var w = img.width, h = img.height;
          if (w > maxDim || h > maxDim) {
            if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
            else { w = Math.round(w * maxDim / h); h = maxDim; }
          }
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
          resolve(dataUrl.split(',')[1]);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    var mediaType = 'image/jpeg';
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey.get(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: MODEL_FAST,
        max_tokens: 300,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 }},
            { type: 'text', text: 'Describe this food in plain English as if logging it for a meal tracker — list the main components and approximate portions (e.g. "grilled chicken breast about 150g, roasted sweet potato, side salad with olive oil dressing"). Be concise, one sentence or short list. If you cannot identify food, say so.' }
          ]
        }]
      })
    });
    var data = await res.json();
    if (!res.ok || data.error) throw new Error((data.error && data.error.message) || 'API error');
    var desc = data.content.map(function(b){ return b.text || ''; }).join('').trim();
    if (refs.textarea) { refs.textarea.value = desc; refs.textarea.focus(); }
    inputVal.value = desc;
  } catch(e) {
    errMsg.set('Photo scan failed: ' + (e.message || 'unknown error'));
  } finally {
    photoScanning.set(false);
  }
}

async function runAnalysis() {
  const list = todayMeals.get();
  if (!list.length) return;
  const latest = list[list.length - 1];
  // Cache: skip API call if meal hasn't changed since last analysis
  const cacheKey = latest.id + ':' + latest.description;
  if (analysis.get() && analysis.get()._cacheKey === cacheKey) {
    analysisOpen.set(true); return;
  }
  analysisLoad.set(true); analysisOpen.set(true); analysis.set(null);
  try {
    const mealList = '- ' + latest.description + ': ' + latest.calories + ' kcal, ' + latest.protein + 'g protein, ' + latest.carbs + 'g carbs, ' + latest.fat + 'g fat';
    const text = await callClaude(
      'You are a warm, caring nutrition guide. Gently identify one way this meal could better nourish the person — not about cutting calories harshly, but about what might serve them better. Also suggest up to 3 additions that would help them feel sustained and energised. Frame everything with care and compassion, not criticism. JSON only, no markdown:\n{"topCut":{"meal":"name","suggestion":"gentle reframe or swap","savedKcal":number},"otherTips":[{"meal":"name","suggestion":"...","savedKcal":number}],"emptyCals":"one gentle sentence about anything that isn\'t serving them well, or null","fillerSuggestions":["caring suggestion + why it helps","caring suggestion + why it helps","caring suggestion + why it helps"],"summary":"one warm, encouraging sentence"}',
      'Most recent meal:\n' + mealList + '\n\nMy daily targets: ' + (goals.get().calories) + ' kcal, ' + (goals.get().protein || 166) + 'g protein, ' + (goals.get().carbs || 250) + 'g carbs, ' + (goals.get().fat || 65) + 'g fat.' + (neverEat.get().length ? '\n\nFoods I will never eat: ' + neverEat.get().join(', ') + '. Do not suggest these.' : '') + '\n\nWhere could I most easily cut calories in this meal?',
      600
    );
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    parsed._cacheKey = latest.id + ':' + latest.description;
    analysis.set(parsed);
    checkedCuts.set({});
    if (parsed.fillerSuggestions) {
      fillerItems.set(parsed.fillerSuggestions.map(function(s) { return { label: s, checked: false }; }));
    }
  } catch(e) { analysis.set({ error: true, message: e.message || 'Unknown error' }); }
  finally { analysisLoad.set(false); }
}

async function runRemake() {
  const al = analysis.get();
  if (!al) return;
  remakeLoading.set(true); remakeResult.set(null);
  const latestMeal = todayMeals.get()[todayMeals.get().length - 1];
  const mealDescs = latestMeal ? latestMeal.description : '';
  const cc = checkedCuts.get();
  const checkedFillers = fillerItems.get().filter(function(i) { return i.checked; }).map(function(i) { return i.label; });
  const activeTips = [];
  if (cc['topCut'] !== false) activeTips.push(al.topCut.suggestion);
  (al.otherTips || []).forEach(function(t, idx) { if (cc['tip-' + idx] !== false) activeTips.push(t.suggestion); });
  const tips = activeTips.join('; ');
  if (!tips && !checkedFillers.length) { errMsg.set('Please check at least one suggestion to apply.'); return; }
  const emptyCals = al.emptyCals || '';
  try {
    const text = await callClaude(
      'You are a meal planning assistant. Rewrite the meal description applying the suggestions and including any requested additions. CRITICAL CONSTRAINT: the rewritten meal must have the same or fewer calories than the original — if adding ingredients, cut elsewhere to compensate. Return JSON only, no markdown: {"description":"plain meal description as someone would type into a meal log","calories":estimated_calorie_count_as_number}',
      'Original meal(s): ' + mealDescs + '. Original calorie total: ~' + Math.round(totals.get().calories) + ' kcal. Person: ' + profileSummary(profile.get()) + '. Suggestions: ' + tips + (emptyCals ? '. Empty calories to reduce: ' + emptyCals : '') + (checkedFillers.length ? '. Also add: ' + checkedFillers.join(', ') : '') + (neverEat.get().length ? '. NEVER suggest or include these foods: ' + neverEat.get().join(', ') + '.' : '') + ' My targets: ' + (goals.get().protein || 166) + 'g protein, ' + (goals.get().fat || 65) + 'g fat. Rewrite the meal applying all of this. The rewritten meal must not exceed ' + Math.round(totals.get().calories) + ' kcal.',
      200
    );
    try {
      const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
      remakeResult.set(parsed);
    } catch(e) {
      remakeResult.set({ description: text.trim(), calories: null });
    }
  } catch(e) { remakeResult.set('Could not generate suggestion. Try again.'); }
  finally { remakeLoading.set(false); }
}

async function runEffect() {
  const tot = totals.get();
  if (!tot.calories) return;
  // Cache: skip if totals haven't changed
  const effectKey = Math.round(tot.calories) + ':' + Math.round(tot.protein) + ':' + Math.round(tot.carbs) + ':' + Math.round(tot.fat);
  if (effectResult.get() && effectResult.get()._cacheKey === effectKey) {
    effectOpen.set(true); return;
  }
  effectLoad.set(true); effectOpen.set(true); effectResult.set(null);
  try {
    const now = new Date();
    const hour = now.getHours();
    const minute = now.getMinutes();
    const ampm = hour < 12 ? 'AM' : 'PM';
    const h12 = hour % 12 || 12;
    const timeStr = h12 + ':' + String(minute).padStart(2,'0') + ' ' + ampm;
    const hoursLeft = Math.max(0, 20 - hour - (minute / 60));
    const windowMsg = hoursLeft === 0
      ? 'The eating window is closed (after 8pm) — this is the full day.'
      : 'About ' + hoursLeft.toFixed(1) + ' hours left in the eating window (stops at 8pm).';
    const mealList = todayMeals.get().map(function(m) { return m.description; }).join('; ');
    const neverStr = neverEat.get().length ? ' Foods this person will never eat: ' + neverEat.get().join(', ') + '.' : '';
    const userMsg = 'Person: ' + profileSummary(profile.get()) + '.' + neverStr + ' ' +
      'Current time: ' + timeStr + '. ' + windowMsg + ' ' +
      'Meals so far: ' + mealList + '. ' +
      'Totals so far: ' + Math.round(tot.calories) + ' kcal, ' +
      Math.round(tot.protein) + 'g protein, ' +
      Math.round(tot.carbs) + 'g carbs, ' +
      Math.round(tot.fat) + 'g fat.';
    const system = 'You are a nutrition and weight loss analyst. Use Mifflin-St Jeor. One short sentence per field. These may not be the full day — account for time remaining. JSON only, no markdown, no backticks: ' +
      '{"tdee":number,"deficit":number,"weeklyLossKg":number,' +
      '"calories":"calories so far and room remaining",' +
      '"protein":"protein so far vs ' + (goals.get().protein || 166) + 'g target and whether more is needed",' +
      '"carbs":"carbs so far and balance",' +
      '"fat":"fat so far",' +
      '"fiber":"fiber estimate",' +
      '"vitamins":"gaps or strengths",' +
      '"overall":"how the day is tracking, or full verdict if after 8pm",' +
      '"motivation":"one short encouraging line"}';
    const text = await callClaude(system, userMsg, 600);
    const er = JSON.parse(text.replace(/```json|```/g,'').trim());
    er._cacheKey = effectKey;
    effectResult.set(er);
  } catch(e) { console.error(e); effectResult.set({ error: true }); }
  finally { effectLoad.set(false); }
}

async function addMeal() {
  const desc = inputVal.value.trim();
  if (!desc || loading.get()) return;
  const nutrition = await estimateMeal(desc);
  if (!nutrition) return;
  saveMeals([...meals.get(), { id:Date.now(), description:desc, date:date.get(), ...nutrition }]);
  analysis.set(null); effectResult.set(null); remakeResult.set(null); // invalidate caches
  checkForReward();
  inputVal.value = '';
  if (refs.textarea) refs.textarea.value = '';
  // Late meal nudge
  const now = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  if (mins >= 20 * 60 && nutrition.calories > 200) {
    lateNudge.set(true);
    setTimeout(function() { lateNudge.set(false); }, 8000);
  }
}

function renderOnboarding() {
  const step = onboardStep.get();
  const data = onboardData.get();
  const loading = onboardLoading.get();
  const err = onboardError.get();

  const STEPS = [
    {
      key: 'here',
      question: "Before we get started — what's brought you here today?",
      placeholder: "Whatever's on your mind...",
      type: 'textarea',
    },
    {
      key: 'lastfor',
      question: "When life gets busy and stretched, who tends to get taken care of last?",
      placeholder: "Be honest...",
      type: 'textarea',
    },
    {
      key: 'restore',
      question: "What's one thing you do that's purely for you — that genuinely restores you?",
      placeholder: "Something that fills you back up...",
      type: 'textarea',
    },
    {
      key: 'whenlast',
      question: "When did you last actually do that?",
      placeholder: "Be honest...",
      type: 'textarea',
    },
    {
      key: 'reward',
      question: "What would you love to work toward as a reward for building this habit? Something just for you — that you keep putting off because others come first.",
      placeholder: "A weekend away, a cooking class, a piece of jewellery, a spa day... anything.",
      type: 'textarea',
    },
    {
      key: 'rewarddesc',
      question: "Describe it at its best. What does it look like?",
      placeholder: "Paint the picture...",
      type: 'textarea',
    },
  ];

  const isLast = step === STEPS.length - 1;
  const currentStep = STEPS[step];

  // Progress dots
  const dots = h('div', { style:{ display:'flex', gap:'6px', justifyContent:'center', marginBottom:'32px' }},
    ...STEPS.map(function(_, i) {
      return h('div', { style:{
        width: i === step ? '20px' : '6px',
        height:'6px',
        borderRadius:'3px',
        background: i < step ? C.accent : i === step ? C.accent : C.border,
        transition:'all 0.3s ease',
      }});
    })
  );

  const inp = h('textarea', {
    placeholder: currentStep.placeholder,
    rows: '4',
    style:{
      width:'100%',
      background:'#faf6f1',
      border:`1px solid ${C.border}`,
      borderRadius:'10px',
      color:C.text,
      fontFamily:"'DM Sans',sans-serif",
      fontSize:'15px',
      padding:'14px 16px',
      resize:'none',
      outline:'none',
      lineHeight:'1.6',
      marginBottom:'16px',
    }
  });
  inp.addEventListener('focus', function() { inp.style.borderColor = C.accent + '88'; });
  inp.addEventListener('blur',  function() { inp.style.borderColor = C.border; });
  // Pre-fill if returning to step
  if (data[currentStep.key]) inp.value = data[currentStep.key];

  const nextBtn = h('button', {
    style:{
      width:'100%',
      padding:'14px',
      background: loading ? C.border : C.accent,
      color: loading ? C.muted : 'white',
      border:'none',
      borderRadius:'10px',
      fontFamily:"'DM Sans',sans-serif",
      fontWeight:'600',
      fontSize:'15px',
      cursor: loading ? 'not-allowed' : 'pointer',
    }
  }, loading ? 'Building your reward...' : isLast ? 'Build my reward →' : 'Continue →');

  nextBtn.addEventListener('click', async function() {
    var val = inp.value.trim();
    if (!val) return;
    var updated = Object.assign({}, data);
    updated[currentStep.key] = val;
    onboardData.set(updated);

    if (!isLast) {
      onboardStep.set(step + 1);
      return;
    }

    // Final step — generate 40-piece reward via Claude
    onboardLoading.set(true);
    onboardError.set('');
    try {
      var prompt = 'Someone has described their reward goal as follows:

' +
        'What they want: ' + updated.reward + '
' +
        'How they describe it at its best: ' + updated.rewarddesc + '

' +
        'Generate exactly 40 meaningful pieces that together represent earning this reward. ' +
        'Each piece should be a small, specific, imaginative step, moment, preparation, or component of the experience — ' +
        'ordered so that small and large pieces are interspersed (not all small first). ' +
        'Make them feel real and personal to what they described, not generic. ' +
        'Some should be logistical (booking, planning), some experiential (a specific moment), some emotional (permission, arrival). ' +
        'Return ONLY a JSON array of 40 objects, no markdown: ' +
        '[{"id":"p1","name":"short name","emoji":"single emoji","desc":"one warm sentence about this piece"}]';

      var res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key': apiKey.get(),
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true',
        },
        body: JSON.stringify({
          model: MODEL_SMART,
          max_tokens: 4000,
          messages:[{ role:'user', content: prompt }]
        })
      });
      var result = await res.json();
      if (!res.ok || result.error) throw new Error((result.error && result.error.message) || 'API error');
      var text = result.content.map(function(b){ return b.text||''; }).join('').trim();
      var parts = JSON.parse(text.replace(/```json|```/g,'').trim());

      var completed = Object.assign({}, updated, {
        completedAt: new Date().toISOString(),
        rewardParts: parts,
        rewardName: updated.reward,
      });
      saveOnboarding(completed);

      // Initialise bike state with new parts
      var freshBike = { unlockedIds:[], awardedDates:[], pendingUnlock:null, streak:0 };
      saveBikeState(freshBike);

    } catch(e) {
      onboardError.set('Something went wrong: ' + (e.message || 'please try again'));
    } finally {
      onboardLoading.set(false);
    }
  });

  // Back button
  const backBtn = step > 0 ? h('button', {
    style:{
      background:'none', border:'none', color:C.muted,
      fontFamily:"'DM Mono',monospace", fontSize:'11px',
      cursor:'pointer', padding:'0', textDecoration:'underline',
      marginTop:'12px', display:'block', marginLeft:'auto', marginRight:'auto',
    }
  }, '← back') : h('span',{});
  if (step > 0) backBtn.addEventListener('click', function() { onboardStep.set(step - 1); });

  return h('div', { style:{ minHeight:'100vh', background:C.bg, display:'flex', alignItems:'center', justifyContent:'center', padding:'24px' }},
    h('div', { style:{ width:'100%', maxWidth:'480px' }},
      h('div', { style:{ textAlign:'center', marginBottom:'40px' }},
        h('h1', { style:{ fontFamily:"'Playfair Display',serif", fontSize:'32px', color:C.accent, marginBottom:'8px' }}, 'Full Cup'),
        h('p', { style:{ color:C.muted, fontSize:'14px' }}, 'you can\'t pour from an empty cup.'),
      ),
      dots,
      h('div', { style:{ background:C.card, borderRadius:'16px', padding:'28px 24px', boxShadow:'0 4px 24px rgba(44,31,20,0.08)' }},
        h('p', { style:{ fontFamily:"'Playfair Display',serif", fontSize:'19px', color:C.text, lineHeight:'1.5', marginBottom:'20px' }}, currentStep.question),
        inp,
        err ? h('div', { style:{ color:C.danger, fontSize:'12px', marginBottom:'12px', fontFamily:"'DM Mono',monospace" }}, err) : h('span',{}),
        nextBtn,
        backBtn,
      ),
      h('p', { style:{ textAlign:'center', color:C.border, fontSize:'11px', marginTop:'20px', fontFamily:"'DM Mono',monospace" }}, (step + 1) + ' of ' + STEPS.length),
    ),
  );
}

            ),
          ),
          h('div', { style:{ borderTop:`1px solid ${C.border}`, paddingTop:'14px', display:'flex', flexDirection:'column', gap:'8px' }},
            ...(['calories','protein','carbs','fat','fiber','vitamins'].map(key => {
              const labels = { calories:'🔥 Calories', protein:'💪 Protein', carbs:'🌾 Carbs', fat:'🥑 Fat', fiber:'🌿 Fiber', vitamins:'💊 Vitamins' };
              return h('div', { style:{ display:'flex', gap:'10px', alignItems:'flex-start' }},
                h('span', { style:{ fontFamily:"'DM Mono',monospace", fontSize:'11px', color:C.muted, whiteSpace:'nowrap', paddingTop:'1px', minWidth:'72px' }}, labels[key]),
                h('span', { style:{ fontSize:'13px', color:C.text, lineHeight:'1.5' }}, eResult[key] || '—'),
              );
            })),
            h('div', { style:{ borderTop:`1px solid ${C.border}`, paddingTop:'10px', marginTop:'2px' }},
              h('span', { style:{ fontSize:'13px', color:C.text, fontWeight:'500' }}, eResult.overall || ''),
            ),
            h('div', { style:{ paddingTop:'8px', fontSize:'12px', color:C.fat, fontStyle:'italic' }}, eResult.motivation || ''),
          ),
          rerun,
        );
      }
      eContent = h('div', { style:{ marginTop:'10px', background:C.analysis, border:`1px solid ${C.fat}33`, borderRadius:'10px', padding:'16px 18px', fontSize:'13px', lineHeight:'1.6' }}, inner || h('span',{}));
    }
    effectPanel = h('div', { style:{ marginBottom:'24px' }}, eToggle, eContent);
  }

  // Meal list
  let mealList;
  if (tm.length === 0) {
    mealList = h('div', { style:{ textAlign:'center', color:C.muted, fontStyle:'italic', padding:'40px 0', fontSize:'14px' }}, 'Nothing logged yet today. Take care of yourself — you deserve it.');
  } else {
    mealList = h('div', {},
      h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px' }},
        h('div', { style:{ fontFamily:"'DM Mono',monospace", fontSize:'11px', textTransform:'uppercase', letterSpacing:'2px', color:C.muted }}, tm.length + ' meal' + (tm.length !== 1 ? 's' : '') + ' logged'),
        (() => {
          const clrBtn = h('button', { style:{ background:'none', border:'none', color:C.danger, fontFamily:"'DM Mono',monospace", fontSize:'10px', cursor:'pointer', padding:'0', textTransform:'uppercase', letterSpacing:'1px', textDecoration:'underline' }}, 'start fresh');
          clrBtn.addEventListener('click', function() {
            if (confirm('Start fresh for today?')) {
              saveMeals([]); analysis.set(null); effectResult.set(null); remakeResult.set(null);
            }
          });
          return clrBtn;
        })(),
      ),
      ...[...tm].reverse().map(meal => {
        const card = h('div', { style:{ background:C.card, border:`1px solid ${C.border}`, borderRadius:'10px', padding:'14px 16px', marginBottom:'10px', display:'flex', gap:'12px', alignItems:'flex-start', transition:'border-color 0.2s' }},
          h('div', { style:{ flex:'1', minWidth:'0' }},
            h('div', { style:{ fontFamily:"'Playfair Display',serif", fontSize:'15px', color:C.text, marginBottom:'6px', lineHeight:'1.3' }}, meal.description),
            h('div', { style:{ display:'flex', gap:'12px', flexWrap:'wrap' }},
              h('span', { style:{ fontSize:'12px', color:C.calories, fontFamily:"'DM Mono',monospace" }}, '🔥 '+meal.calories+' kcal'),
              h('span', { style:{ fontSize:'12px', color:C.protein,  fontFamily:"'DM Mono',monospace" }}, '💪 '+meal.protein+'g prot'),
              h('span', { style:{ fontSize:'12px', color:C.carbs,    fontFamily:"'DM Mono',monospace" }}, '🌾 '+meal.carbs+'g carbs'),
              h('span', { style:{ fontSize:'12px', color:C.fat,      fontFamily:"'DM Mono',monospace" }}, '🥑 '+(meal.fat||0)+'g fat'),
            ),
            meal.note ? h('div', { style:{ fontSize:'11px', color:C.muted, marginTop:'5px', fontStyle:'italic' }}, meal.note) : h('span',{}),
          ),
          h('div', { style:{ display:'flex', gap:'6px', flexShrink:'0' }},
            iconBtn('↻', C.accent, () => { inputVal.value = meal.description; if(refs.textarea) refs.textarea.value = meal.description; }),
            iconBtn('×', C.danger, () => { saveMeals(meals.get().filter(m => m.id !== meal.id)); analysis.set(null); effectResult.set(null); remakeResult.set(null); }),
          ),
        );
        card.addEventListener('mouseenter', () => card.style.borderColor = C.accent+'55');
        card.addEventListener('mouseleave', () => card.style.borderColor = C.border);
        return card;
      }),
    );
  }

  return h('div', { style:{ minHeight:'100vh', background:C.bg, color:C.text, fontFamily:"'DM Sans',sans-serif" }},
    h('div', { style:{ maxWidth:'520px', margin:'0 auto', padding:'32px 16px 64px' }},
      header, goalsEditor, summary, profilePanel, bikePanel, neverPanel, inputSection,
      lateNudge.get() ? h('div', { style:{ background:'#1a1510', border:'1px solid ' + C.accent + '55', borderRadius:'10px', padding:'12px 16px', marginBottom:'16px', display:'flex', gap:'10px', alignItems:'flex-start' }},
        h('span', { style:{ fontSize:'18px', flexShrink:'0' }}, '🌙'),
        h('div', {},
          h('div', { style:{ color:C.accent, fontFamily:"'DM Mono',monospace", fontSize:'11px', textTransform:'uppercase', letterSpacing:'1px', marginBottom:'3px' }}, 'Late meal'),
          h('div', { style:{ color:C.muted, fontSize:'13px', lineHeight:'1.5' }}, 'It’s getting late — something gentle might serve you better now.'),
        ),
      ) : h('span',{}),
      analysisPanel, effectPanel, mealList,
    ),
  );
}

try {
  mount(document.getElementById('root'), () =>
    !apiKey.get() ? renderApiKeyScreen() :
    !onboarding.get() ? renderOnboarding() :
    renderApp()
  );
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="color:#e07b54;padding:32px;font-family:monospace;font-size:13px;white-space:pre-wrap;">Error: ' + e.message + '\n\n' + e.stack + '</div>';
}
</script>
</body>
</html>
